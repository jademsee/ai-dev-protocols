# Pre-commit configuration for secret detection
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Gitleaks - secret detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
        name: Secret detection (gitleaks)
        args: ['--config', '.gitleaks.toml']
        verbose: true

  # Local hooks
  - repo: local
    hooks:
      # Validate .env against schema
      - id: validate-env-schema
        name: Validate .env against schema
        entry: ./scripts/validate-env-schema.sh
        language: script
        files: ^\.env$
        pass_filenames: false

      # Prevent .env files from being committed (backup safety)
      - id: check-env-not-staged
        name: Check .env files are not staged
        entry: bash -c 'git diff --cached --name-only | grep -E "\.env$" && echo "ERROR: .env files should not be committed" && exit 1 || exit 0'
        language: system
        pass_filenames: false
        always_run: true

# Global settings
default_stages: [pre-commit]
fail_fast: true
