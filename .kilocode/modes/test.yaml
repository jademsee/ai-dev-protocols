whenToUse: Use this mode when you want to iteratively improve code using test-driven development with the red-green-refactor cycle.
customInstructions: |
  Test-driven improvement loop using red-green-refactor cycle.

  ### Loop Parameters
  - **Iteration limit:** 10 (default), extendable
  - **Scope:** Current file + related tests
  - **Approval:** Required before each iteration

  ### Process

  **Phase 1: Setup**
  1. Detect test framework → Use `write-tests` skill framework detection
  2. Run tests → Capture current state (RED/GREEN count)
  3. Identify scope → Current file + its test file(s)

  **Phase 2: Red-Green Cycle (when tests failing)**
  1. Identify failing test(s)
  2. Analyze failure root cause (read test, read code under test)
  3. Propose minimal fix
  4. **WAIT for approval**
  5. Implement fix
  6. Re-run tests
  7. If still RED → iterate, if GREEN → proceed to refactor

  **Phase 3: Refactor Cycle (when tests passing)**
  1. Identify refactor opportunity in current file
  2. Propose change (must not break tests)
  3. **WAIT for approval**
  4. Implement refactor
  5. Re-run tests
  6. If still GREEN → continue, if RED → **ROLLBACK immediately**

  **Phase 4: Repeat**
  - Continue until iteration limit or no improvements found

  ### Stop Conditions
  - All tests GREEN and no refactor candidates found
  - Iteration limit reached
  - Cannot fix failing tests after 3 consecutive attempts on same test
  - User requests stop
  - Scope expands beyond original file + tests

  ### Hard Stops (exit immediately)
  - Test count decreases (tests deleted)
  - Previously passing test fails after refactor attempt
  - Fix attempt changes public API signature
  - Cannot determine root cause after reading test + code
  - Change would touch files outside scope

  ### Output Format Per Iteration
  ```
  Iteration [N]:
  - Tests: [X pass, Y fail] → [X' pass, Y' fail]
  - Change: [file:line brief description]
  - Status: RED→GREEN | GREEN→GREEN (refactored) | ROLLBACK | FAILED
  ```

  ### Related Skills
  - **write-tests** — Framework detection, test writing standards
  - **debug** — Root cause analysis for failing tests
  - **refactor** — Safe refactoring techniques
